<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuppa Hooch — Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════
       CATEGORY SCREEN
  ══════════════════════════════ -->
  <div id="category-screen">

    <header class="site-header">
      <img src="hoochheader.png" alt="Cuppa Hooch" class="header-logo" />
      <p class="tagline">Brunch to Dinner &nbsp;·&nbsp; Coffee to Beers</p>
    </header>

    <!-- wave divider -->
    <div class="wave">
      <svg viewBox="0 0 1200 48" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,32 C200,60 400,0 600,28 C800,56 1000,4 1200,24 L1200,0 L0,0 Z"
              fill="url(#waveGrad)" />
        <defs>
          <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#d63416"/>
            <stop offset="50%"  stop-color="#f26122"/>
            <stop offset="100%" stop-color="#f5a623"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <p class="section-label">What would you like to see?</p>

    <!--
    ╔═══════════════════════════════════════════════════════╗
    ║  HOW TO ADD YOUR PHOTOS                               ║
    ║                                                       ║
    ║  Each button has  data-images=""                      ║
    ║  Put your image filenames there, comma-separated.     ║
    ║                                                       ║
    ║  Example (2 photos):  data-images="bev1.jpg,bev2.jpg" ║
    ║  Example (1 photo):   data-images="coffee-menu.jpg"   ║
    ║                                                       ║
    ║  Keep all images in the same folder as this file.     ║
    ╚═══════════════════════════════════════════════════════╝
    -->

    <nav class="cat-grid" id="cat-grid">

      <button class="cat-btn"
              data-label="Beverages"
              data-images="beverages.png, ">
        <div class="cat-icon-wrap">
          <i class="bi bi-droplet-fill"></i>
        </div>
        <span class="cat-label">Beverages</span>
      </button>

      <button class="cat-btn"
              data-label="Ala Carte"
              data-images="ala carte.png">
        <div class="cat-icon-wrap">
          <i class="bi-heart-fill"></i>
        </div>
        <span class="cat-label">Ala Carte</span>
      </button>

      <button class="cat-btn"
              data-label="Desserts"
              data-images="desserts.png">
        <div class="cat-icon-wrap">
          <i class="bi bi-cake2-fill"></i>
        </div>
        <span class="cat-label">Desserts</span>
      </button>

      <button class="cat-btn"
              data-label="Snacks"
              data-images="snacks.png">
        <div class="cat-icon-wrap">
          <i class="bi bi-egg-fried"></i>
        </div>
        <span class="cat-label">Snacks</span>
      </button>

      <button class="cat-btn"
              data-label="Specials"
              data-images="specials.png">
        <div class="cat-icon-wrap">
          <i class="bi bi-stars"></i>
        </div>
        <span class="cat-label">Specials</span>
      </button>

    </nav>

    <footer class="site-footer">
      <i class="bi bi-cup-hot-fill"></i>
      <span>Cuppa Hooch &nbsp;·&nbsp; Tap a category to explore our menu</span>
    </footer>

  </div>

  <!-- ══════════════════════════════
       VIEWER SCREEN
  ══════════════════════════════ -->
  <div id="viewer-screen">
    <div class="slide-area" id="slide-area">

      <div class="slides-track" id="slides-track"></div>

      <!-- floating X close button -->
      <button class="close-float" id="close-btn">
        <i class="bi bi-x-lg"></i>
      </button>

      <!-- floating fit-to-screen button -->
      <button class="fullscreen-float" id="fullscreen-btn" title="Fill screen">
        <i class="bi bi-arrows-angle-expand" id="fullscreen-icon"></i>
      </button>

      <!-- floating page counter -->
      <span class="counter-float" id="viewer-counter">1 / 2</span>

      <!-- prev / next arrows -->
      <button class="arrow-btn prev" id="prev-btn">
        <i class="bi bi-chevron-left"></i>
      </button>
      <button class="arrow-btn next" id="next-btn">
        <i class="bi bi-chevron-right"></i>
      </button>

      <!-- floating dots -->
      <div class="dot-row" id="dot-row"></div>

    </div>
  </div>

  <script src="menu.js"></script>
</body>
</html>
